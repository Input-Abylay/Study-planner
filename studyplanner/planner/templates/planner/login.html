{% extends "planner/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h1>Login</h1>
    <form method="post" class="card-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
    </form>
    <p>No account? <a href="{% url 'register' %}">Register here</a>.</p>
{% endblock %}
